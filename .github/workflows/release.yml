name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          asset="fe-${tag}-${{ matrix.target }}.tar.gz"
          mkdir -p dist package
          cp "target/${{ matrix.target }}/release/fe" package/fe
          tar -C package -czf "dist/${asset}" fe
          shasum -a 256 "dist/${asset}" | awk '{print $1}' > "dist/${asset}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -type f -name '*.tar.gz' -exec cp {} release-assets/ \;
          find dist -type f -name '*.sha256' -exec cp {} release-assets/ \;

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "fe ${TAG}" --notes "Automated fe release ${TAG}."

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: gh release upload "$TAG" release-assets/* --clobber

      - name: Upload Homebrew formula artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-inputs
          path: release-assets/*
          if-no-files-found: error

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: publish
    env:
      TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release asset checksums
        uses: actions/download-artifact@v4
        with:
          name: homebrew-inputs
          path: release-assets

      - name: Update tap formula
        if: env.TAP_GITHUB_TOKEN != ''
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/songjiahaocoding/homebrew-tap.git" tap
          cd tap
          mkdir -p Formula

          version="${TAG#v}"
          base_url="https://github.com/songjiahaocoding/fe/releases/download/${TAG}"
          linux_asset="fe-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
          mac_intel_asset="fe-${TAG}-x86_64-apple-darwin.tar.gz"
          mac_arm_asset="fe-${TAG}-aarch64-apple-darwin.tar.gz"
          linux_sha="$(cat ../release-assets/${linux_asset}.sha256)"
          mac_intel_sha="$(cat ../release-assets/${mac_intel_asset}.sha256)"
          mac_arm_sha="$(cat ../release-assets/${mac_arm_asset}.sha256)"

          cat > Formula/fe.rb <<FORMULA
          class Fe < Formula
            desc "Agent-friendly structured file editor for JSON and YAML"
            homepage "https://github.com/songjiahaocoding/fe"
            version "${version}"

            on_macos do
              if Hardware::CPU.arm?
                url "${base_url}/${mac_arm_asset}"
                sha256 "${mac_arm_sha}"
              else
                url "${base_url}/${mac_intel_asset}"
                sha256 "${mac_intel_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${base_url}/${linux_asset}"
                sha256 "${linux_sha}"
              else
                odie "fe does not provide a Linux ARM64 Homebrew bottle yet"
              end
            end

            def install
              bin.install "fe"
            end

            test do
              assert_match "Usage: fe", shell_output("#{bin}/fe --help")
            end
          end
          FORMULA

          git add Formula/fe.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula is already up to date."
          else
            git commit -m "Update fe to ${TAG}"
            git push origin HEAD:main
          fi

      - name: Explain skipped tap update
        if: env.TAP_GITHUB_TOKEN == ''
        run: |
          echo "TAP_GITHUB_TOKEN is not configured; skipping Homebrew tap update."
          exit 1
